# HeadDropPlugin 配置文件
# 作者: SCROAM
# 网站: blog.world123.top

# 头颅掉落几率 (0.0 - 1.0)
# 0.1 = 10% 几率
drop-chance: 0.1

# 是否掉落玩家头颅
drop-player-heads: true

# 是否掉落怪物头颅
drop-mob-heads: true

# 是否掉落动物头颅
drop-animal-heads: true

# 怪物设置
mobs:
  enabled: true
  # 黑名单 - 这些生物不会掉落头颅
  blacklist: []
  # 白名单 - 只有这些生物会掉落头颅 (留空表示所有生物都可以)
  whitelist: []

# 动物设置
animals:
  enabled: true
  # 黑名单 - 这些生物不会掉落头颅
  blacklist: []
  # 白名单 - 只有这些生物会掉落头颅 (留空表示所有生物都可以)
  whitelist: []

# 头颅显示名称
show-head-names: true
head-name-prefix: ""
head-name-suffix: " 的头颅"

# 是否显示掉落消息
show-drop-messages: true

# 离线模式 - 启用后不依赖网络获取纹理
# 适合国内服务器或网络不稳定的环境
offline-mode: false

# 纹理缓存设置 (仅在线模式生效)
texture-cache:
  enabled: true
  # 缓存目录相对于插件数据文件夹
  directory: texture_cache

# 消息配置
messages:
  drop-message: "&a[头颅掉落] &6%s &e的头颅掉落了！"
